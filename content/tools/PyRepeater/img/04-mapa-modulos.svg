<svg viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mapa de dependencias entre módulos">
<style>
.s-box{fill:#ffffff;stroke:#e4e4e8;stroke-width:1.5}
.s-accent{fill:#fff3ee;stroke:#ff6633;stroke-width:1.5}
.s-dark{fill:#25252b;stroke:#25252b}
.t{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12px;fill:#1d1d1f}
.t-w{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12px;fill:#ffffff}
.t-mut{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:10.5px;fill:#6b6b73}
.t-title{font-family:system-ui,-apple-system,Arial,sans-serif;font-size:12.5px;font-weight:650;fill:#1d1d1f}
.arrow{stroke:#6b6b73;stroke-width:1.6;fill:none}
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
        <defs>
          <marker id="ah4" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 z" fill="#6b6b73"/>
          </marker>
        </defs>

        <!-- nodos -->
        <rect class="s-box" x="40" y="110" width="130" height="44" rx="10"/>
        <text class="t" x="105" y="137" text-anchor="middle">run.py</text>

        <rect class="s-box" x="220" y="110" width="150" height="44" rx="10"/>
        <text class="t" x="295" y="137" text-anchor="middle">server.py</text>

        <rect class="s-accent" x="430" y="46" width="150" height="44" rx="10"/>
        <text class="t" x="505" y="73" text-anchor="middle" fill="#e25529">client.py</text>

        <rect class="s-accent" x="430" y="174" width="150" height="44" rx="10"/>
        <text class="t" x="505" y="201" text-anchor="middle" fill="#e25529">parallel.py</text>

        <rect class="s-dark" x="650" y="110" width="140" height="44" rx="10"/>
        <text class="t-w" x="720" y="132" text-anchor="middle">raw_http.py</text>
        <text class="t-w" x="720" y="146" text-anchor="middle" font-size="9.5" fill="#9a9aa5">sin dependencias</text>

        <!-- aristas -->
        <path class="arrow" d="M170 132 H216" marker-end="url(#ah4)"/>
        <path class="arrow" d="M370 126 C400 120 405 80 426 72" marker-end="url(#ah4)"/>
        <path class="arrow" d="M370 138 C400 150 405 190 426 194" marker-end="url(#ah4)"/>
        <path class="arrow" d="M580 68 C620 80 630 104 648 122" marker-end="url(#ah4)"/>
        <path class="arrow" d="M580 196 C620 184 630 160 648 142" marker-end="url(#ah4)"/>
        <!-- parallel también usa client -->
        <path class="arrow" d="M505 174 V96" stroke-dasharray="4 4" marker-end="url(#ah4)"/>
        <text class="t-mut" x="514" y="140">usa client</text>
        <text class="t-mut" x="514" y="152">para el caso de 1</text>
      </svg>