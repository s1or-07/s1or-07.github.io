<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flujo de una petición">
<style>
.s-box{fill:#ffffff;stroke:#e4e4e8;stroke-width:1.5}
.s-accent{fill:#fff3ee;stroke:#ff6633;stroke-width:1.5}
.s-dark{fill:#25252b;stroke:#25252b}
.t{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12px;fill:#1d1d1f}
.t-w{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12px;fill:#ffffff}
.t-mut{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:10.5px;fill:#6b6b73}
.t-title{font-family:system-ui,-apple-system,Arial,sans-serif;font-size:12.5px;font-weight:650;fill:#1d1d1f}
.arrow{stroke:#6b6b73;stroke-width:1.6;fill:none}
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
        <defs>
          <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 z" fill="#ff6633"/>
          </marker>
        </defs>
        <!-- carril navegador / python -->
        <rect x="0" y="0" width="410" height="470" fill="#fff7f3" opacity=".55"/>
        <text class="t-mut" x="20" y="26">navegador</text>
        <text class="t-mut" x="430" y="26">python (tu máquina)</text>

        <!-- pasos -->
        <!-- 1 -->
        <g>
          <circle cx="40" cy="70" r="14" fill="#ff6633"/>
          <text class="t-w" x="40" y="74" text-anchor="middle" font-weight="700">1</text>
          <rect class="s-box" x="70" y="50" width="300" height="42" rx="9"/>
          <text class="t-title" x="86" y="70">Editas la petición cruda</text>
          <text class="t-mut" x="86" y="84">app.js guarda el texto de la pestaña</text>
        </g>
        <path class="arrow" stroke="#ff6633" d="M40 84 V116" marker-end="url(#ah2)"/>
        <!-- 2 -->
        <g>
          <circle cx="40" cy="140" r="14" fill="#ff6633"/>
          <text class="t-w" x="40" y="144" text-anchor="middle" font-weight="700">2</text>
          <rect class="s-box" x="70" y="120" width="300" height="42" rx="9"/>
          <text class="t-title" x="86" y="140">Resuelve el destino</text>
          <text class="t-mut" x="86" y="154">Target, o la cabecera Host si está vacío</text>
        </g>
        <path class="arrow" stroke="#ff6633" d="M40 154 V186 M370 141 H470 V186" marker-end="url(#ah2)"/>
        <!-- 3 -->
        <g>
          <circle cx="440" cy="210" r="14" fill="#25252b"/>
          <text class="t-w" x="440" y="214" text-anchor="middle" font-weight="700">3</text>
          <rect class="s-box" x="470" y="190" width="320" height="42" rx="9"/>
          <text class="t-title" x="486" y="210">POST /api/send → server.py</text>
          <text class="t-mut" x="486" y="224">viaja el JSON con destino + petición</text>
        </g>
        <path class="arrow" stroke="#ff6633" d="M440 224 V256" marker-end="url(#ah2)"/>
        <!-- 4 -->
        <g>
          <circle cx="440" cy="280" r="14" fill="#25252b"/>
          <text class="t-w" x="440" y="284" text-anchor="middle" font-weight="700">4</text>
          <rect class="s-box" x="470" y="260" width="320" height="42" rx="9"/>
          <text class="t-title" x="486" y="280">send_request() arma y envía</text>
          <text class="t-mut" x="486" y="294">raw_http parsea · http.client abre socket</text>
        </g>
        <path class="arrow" stroke="#ff6633" d="M440 294 V326" marker-end="url(#ah2)"/>
        <!-- 5 -->
        <g>
          <circle cx="440" cy="350" r="14" fill="#25252b"/>
          <text class="t-w" x="440" y="354" text-anchor="middle" font-weight="700">5</text>
          <rect class="s-box" x="470" y="330" width="320" height="42" rx="9"/>
          <text class="t-title" x="486" y="350">El objetivo responde</text>
          <text class="t-mut" x="486" y="364">se descomprime y se mide el tiempo</text>
        </g>
        <path class="arrow" stroke="#ff6633" d="M470 351 H400 V396 M440 396 V420" marker-end="url(#ah2)"/>
        <!-- 6 -->
        <g>
          <circle cx="40" cy="420" r="14" fill="#ff6633"/>
          <text class="t-w" x="40" y="424" text-anchor="middle" font-weight="700">6</text>
          <rect class="s-box" x="70" y="400" width="360" height="42" rx="9"/>
          <text class="t-title" x="86" y="420">app.js pinta la respuesta</text>
          <text class="t-mut" x="86" y="434">resaltado, estado, tamaño, y al historial</text>
        </g>
      </svg>