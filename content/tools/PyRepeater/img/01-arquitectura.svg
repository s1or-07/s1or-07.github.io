<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagrama de arquitectura">
<style>
.s-box{fill:#ffffff;stroke:#e4e4e8;stroke-width:1.5}
.s-accent{fill:#fff3ee;stroke:#ff6633;stroke-width:1.5}
.s-dark{fill:#25252b;stroke:#25252b}
.t{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12px;fill:#1d1d1f}
.t-w{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12px;fill:#ffffff}
.t-mut{font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:10.5px;fill:#6b6b73}
.t-title{font-family:system-ui,-apple-system,Arial,sans-serif;font-size:12.5px;font-weight:650;fill:#1d1d1f}
.arrow{stroke:#6b6b73;stroke-width:1.6;fill:none}
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
        <!-- Navegador -->
        <rect class="s-accent" x="16" y="112" width="150" height="76" rx="12"/>
        <text class="t-title" x="91" y="140" text-anchor="middle">Navegador</text>
        <text class="t-mut" x="91" y="158" text-anchor="middle">interfaz web</text>
        <text class="t-mut" x="91" y="172" text-anchor="middle">web/*.html·css·js</text>

        <!-- flecha 1 -->
        <path class="arrow" d="M166 150 H236" marker-end="url(#ah)"/>
        <text class="t-mut" x="201" y="142" text-anchor="middle">HTTP</text>
        <text class="t-mut" x="201" y="166" text-anchor="middle">local</text>

        <!-- Servidor -->
        <rect class="s-box" x="236" y="96" width="168" height="108" rx="12"/>
        <text class="t-title" x="320" y="122" text-anchor="middle">Servidor local</text>
        <text class="t" x="320" y="142" text-anchor="middle" fill="#e25529">server.py</text>
        <text class="t-mut" x="320" y="164" text-anchor="middle">sirve la interfaz</text>
        <text class="t-mut" x="320" y="180" text-anchor="middle">y expone /api/…</text>

        <!-- flecha 2 -->
        <path class="arrow" d="M404 150 H474" marker-end="url(#ah)"/>

        <!-- Backend de envío (dos módulos) -->
        <rect class="s-box" x="474" y="70" width="180" height="160" rx="12" fill="#fbfbfc"/>
        <text class="t-mut" x="564" y="90" text-anchor="middle">motor de envío</text>
        <rect class="s-accent" x="490" y="102" width="148" height="46" rx="9"/>
        <text class="t" x="564" y="122" text-anchor="middle" fill="#e25529">client.py</text>
        <text class="t-mut" x="564" y="138" text-anchor="middle">1 petición</text>
        <rect class="s-accent" x="490" y="156" width="148" height="58" rx="9"/>
        <text class="t" x="564" y="176" text-anchor="middle" fill="#e25529">parallel.py</text>
        <text class="t-mut" x="564" y="192" text-anchor="middle">N en paralelo</text>
        <text class="t-mut" x="564" y="206" text-anchor="middle">(race conditions)</text>

        <!-- flecha 3 -->
        <path class="arrow" d="M654 150 H724" marker-end="url(#ah)"/>
        <text class="t-mut" x="689" y="142" text-anchor="middle">socket</text>
        <text class="t-mut" x="689" y="166" text-anchor="middle">TCP/TLS</text>

        <!-- Objetivo -->
        <rect class="s-dark" x="724" y="112" width="80" height="76" rx="12"/>
        <text class="t-w" x="764" y="145" text-anchor="middle">Sitio</text>
        <text class="t-w" x="764" y="162" text-anchor="middle">objetivo</text>

        <defs>
          <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 z" fill="#6b6b73"/>
          </marker>
        </defs>
      </svg>